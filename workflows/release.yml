# .github/workflows/release.yml
# GitHub Actions workflow to build and release BitMango Free Edition as standalone binaries.

name: Build and Release BitMango Free

on:
  push:
    branches:
      - 'releases-[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/Date (YYYY-MM-DD)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # Job 1: Check for changelog
  check-changelog:
    runs-on: ubuntu-latest
    outputs:
      date_str: ${{ steps.get_date.outputs.date }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract date from branch name
        id: get_date
        run: |
          DATE_STR="${{ github.event.inputs.version }}"
          if [ -z "$DATE_STR" ]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            if [[ "$BRANCH_NAME" == releases-* ]]; then
              DATE_STR="${BRANCH_NAME#releases-}"
            fi
          fi
          if [ -z "$DATE_STR" ]; then DATE_STR=$(date +%Y-%m-%d); fi
          echo "date=$DATE_STR" >> $GITHUB_OUTPUT

      - name: Validate Changelog
        run: |
          FILE="docs/changelogs/${{ steps.get_date.outputs.date }}.md"
          if [ ! -f "$FILE" ]; then
            echo "❌ Error: Changelog file $FILE not found."
            exit 1
          fi
          echo "✅ Changelog found: $FILE"

  # Job 2: Create the GitHub Release
  create-release:
    needs: check-changelog
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      date_str: ${{ needs.check-changelog.outputs.date_str }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.BITMANGO_TRADE_CLI_PAT }}
          repository: bitmango-trading/bitmango-trade-cli
          name: Release ${{ needs.check-changelog.outputs.date_str }}
          tag_name: ${{ needs.check-changelog.outputs.date_str }}
          body_path: docs/changelogs/${{ needs.check-changelog.outputs.date_str }}.md
          draft: false
          prerelease: false

  # Job 2: Multi-platform Matrix Build
  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create Virtual Environment
        run: |
          uv venv
          # Set VIRTUAL_ENV for uv and maturin
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV
          # Add venv bin/Scripts to path for all subsequent steps
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Install dependencies
        run: |
          uv pip install maturin nuitka zstandard
          if [ -f "requirements.txt" ]; then uv pip install -r requirements.txt; fi
        shell: bash

      - name: Build and Install Rust modules
        run: |
          # Maturin must run in the directory containing the crate to be built
          cd bitmango-pro/bitmango-pro-core
          maturin build --release --out ../../dist
          cd ../../
          uv pip install dist/*.whl
        shell: bash

      - name: Run Nuitka Build
        run: |
          # Note: If build.py does not exist, we use a standard Nuitka command 
          # to compile the entry points into standalone binaries.
          if [ -f "build.py" ]; then
            python build.py
          else
            # Compile core binaries using Nuitka standalone mode
            # bitmango
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --output-filename=bitmango${{ matrix.suffix }} \
              bitmango-free/bin/bitmango
            
            # bitmango-vault
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --output-filename=bitmango-vault${{ matrix.suffix }} \
              bitmango-free/bin/bitmango-vault
            
            # bitmango-help
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --output-filename=bitmango-help${{ matrix.suffix }} \
              bitmango-free/bin/bitmango-help
          fi
        shell: bash

      - name: Package Binaries
        id: package
        run: |
          DATE_STR="${{ needs.create-release.outputs.date_str }}"
          ZIP_NAME="bitmango-${DATE_STR}-${{ matrix.platform }}.zip"
          
          # Collect all binaries into a zip
          mkdir -p dist_release
          mv bitmango${{ matrix.suffix }} dist_release/
          mv bitmango-vault${{ matrix.suffix }} dist_release/
          mv bitmango-help${{ matrix.suffix }} dist_release/
          
          # Add LICENSE and README if they exist
          cp LICENSE dist_release/ 2>/dev/null || true
          cp bitmango-free/LICENSE dist_release/ 2>/dev/null || true
          cp README.md dist_release/ 2>/dev/null || true
          
          cd dist_release
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a ../$ZIP_NAME *
          else
            zip -r ../$ZIP_NAME *
          fi
          echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.date_str }}
          files: ${{ steps.package.outputs.zip_path }}

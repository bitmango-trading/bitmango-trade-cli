name: Build and Publish Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
      source_ref: {description: "Source Ref (Branch/Tag) to build from", required: true}

jobs:
  build:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux, suffix: ""}
          - {os: windows-latest, platform: windows, suffix: ".exe"}
          - {os: macos-latest, platform: macos, suffix: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - name: Prepare Binaries
        shell: bash
        run: |
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          for entry in bitmango bitmango-vault bitmango-help; do
            SOURCE_PATH="bin/$entry"
            if [ ! -f "$SOURCE_PATH" ]; then SOURCE_PATH="bitmango-free/bin/$entry"; fi
            # Copy the Python script directly (designed to run via uv)
            cp "$SOURCE_PATH" "bin_outputs/${{ matrix.platform }}/$entry"
            chmod +x "bin_outputs/${{ matrix.platform }}/$entry"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ matrix.platform }}"
          path: "bin_outputs/${{ matrix.platform }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/download-artifact@v4
        with: {path: "artifacts"}
      
      - name: Create Binary Packages
        run: |
          VERSION="${{ github.event.inputs.version }}"
          
          # Create platform-specific binary zips
          cd artifacts/binaries-linux && zip -r "../../bitmango-free-$VERSION-linux-bin.zip" . && cd ../..
          cd artifacts/binaries-macos && zip -r "../../bitmango-free-$VERSION-macos-bin.zip" . && cd ../..
          cd artifacts/binaries-windows && zip -r "../../bitmango-free-$VERSION-windows-bin.zip" . && cd ../..
      
      - name: Create Full Packages
        run: |
          VERSION="${{ github.event.inputs.version }}"
          
          # Create platform-specific full zips with source + binaries
          mkdir -p dist_full/linux dist_full/macos dist_full/windows
          
          # Copy source code
          cp -r bitmango-cli dist_full/linux/ 2>/dev/null || true
          cp -r bitmango-cli dist_full/macos/ 2>/dev/null || true
          cp -r bitmango-cli dist_full/windows/ 2>/dev/null || true
          
          # Copy demo folder (needed by bitmango-help)
          cp -r demo dist_full/linux/ 2>/dev/null || true
          cp -r demo dist_full/macos/ 2>/dev/null || true
          cp -r demo dist_full/windows/ 2>/dev/null || true
          
          # Copy config folder
          cp -r config dist_full/linux/ 2>/dev/null || true
          cp -r config dist_full/macos/ 2>/dev/null || true
          cp -r config dist_full/windows/ 2>/dev/null || true
          
          # Copy binaries to respective folders
          mkdir -p dist_full/linux/bin
          mkdir -p dist_full/macos/bin
          cp -r artifacts/binaries-linux/* dist_full/linux/bin/ 2>/dev/null || true
          cp -r artifacts/binaries-macos/* dist_full/macos/bin/ 2>/dev/null || true
          cp -r artifacts/binaries-windows/* dist_full/windows/ 2>/dev/null || true
          
          # Copy platform-specific install scripts
          cp install-bitmango.sh dist_full/linux/ 2>/dev/null || true
          cp setup_env.sh dist_full/linux/ 2>/dev/null || true
          cp install-bitmango-macos.command dist_full/macos/ 2>/dev/null || true
          cp setup-env-macos.command dist_full/macos/ 2>/dev/null || true
          cp install-bitmango.ps1 dist_full/windows/ 2>/dev/null || true
          cp setup-env.ps1 dist_full/windows/ 2>/dev/null || true
          
          # Copy common files
          for dir in linux macos windows; do
            cp LICENSE .gitignore requirements.txt README.md SECURITY.md NOTICE.txt dist_full/$dir/ 2>/dev/null || true
            cp -r tutorials dist_full/$dir/ 2>/dev/null || true
          done
          
          # Create platform-specific full zips
          cd dist_full/linux && zip -r "../../bitmango-free-$VERSION-linux-full.zip" . && cd ../..
          cd dist_full/macos && zip -r "../../bitmango-free-$VERSION-macos-full.zip" . && cd ../..
          cd dist_full/windows && zip -r "../../bitmango-free-$VERSION-windows-full.zip" . && cd ../..
      
      - name: Create Release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            *.zip
        env:
          GH_TOKEN: ${{ github.token }}
name: Build and Publish Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
      source_ref: {description: "Source Ref (Branch/Tag) to build from", required: true}

jobs:
  prepare-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - name: Create SDK Package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dist_sdk
          # Flexible copy: look for common source directories
          for dir in bitmango-free bitmango-cli bitmango-pro; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* dist_sdk/
            fi
          done
          # Copy essential files if they exist
          [ -d "demo" ] && cp -r demo dist_sdk/
          [ -d "config" ] && cp -r config dist_sdk/
          [ -d "tutorials" ] && cp -r tutorials dist_sdk/
          [ -f "LICENSE" ] && cp LICENSE dist_sdk/
          [ -f "README-SDK.md" ] && cp README-SDK.md dist_sdk/README.md
          [ -f "SECURITY.md" ] && cp SECURITY.md dist_sdk/
          
          cd dist_sdk && zip -r "../bitmango-${VERSION}-sdk.zip" . && cd ..
          rm -rf dist_sdk
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-package
          path: bitmango-${{ github.event.inputs.version }}-sdk.zip

  build:
    needs: prepare-source
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        entry: [bitmango, bitmango-vault, bitmango-help]
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - name: Build Standalone Binary
        shell: bash
        run: |
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          mkdir -p build_staging

          python -m venv venv
          if [ -f "venv/Scripts/activate" ]; then . venv/Scripts/activate; else . venv/bin/activate; fi
          pip install nuitka zstandard
          [ -f "requirements.txt" ] && pip install -r requirements.txt

          cp -r bitmango-cli build_staging/bitmango 2>/dev/null || cp -r bitmango-free/bitmango-cli build_staging/bitmango
          cp -r bin build_staging/ 2>/dev/null || cp -r bitmango-free/bin build_staging/
          cp -r demo build_staging/ 2>/dev/null || true
          cp -r config build_staging/ 2>/dev/null || true

          cd build_staging
          
          # Retry loop and resource limitation for Nuitka
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          # Windows-specific: limit jobs to 1 to save memory
          JOBS_FLAG="--jobs=2"
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            JOBS_FLAG="--jobs=1"
          fi

          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            echo "Attempt $((RETRY_COUNT+1)) to build ${{ matrix.entry }}..."
            if python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --follow-imports $JOBS_FLAG \
              --output-dir=. \
              --output-filename="../bin_outputs/${{ matrix.platform }}/${{ matrix.platform }}-${{ matrix.entry }}${{ matrix.suffix }}" "bin/${{ matrix.entry }}"; then
              SUCCESS=true
            else
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "Build failed. Retrying in 10 seconds..."
              sleep 10
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to build ${{ matrix.entry }} after $MAX_RETRIES attempts."
            exit 1
          fi
          
          cd ..
          rm -rf build_staging
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ matrix.platform }}-${{ matrix.entry }}"
          path: "bin_outputs/${{ matrix.platform }}"

  release:
    needs: [prepare-source, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/download-artifact@v4
        with: {path: "artifacts"}

      - name: Create Binary Packages
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dist_final
          # Diagnostic: list artifacts
          echo "Listing artifacts:"
          ls -R artifacts

          for platform in linux macos windows; do
            mkdir -p "dist_binary_${platform}"

            # Copy all entry points for this platform from their specific artifact directories
            cp artifacts/binaries-${platform}-*/* dist_binary_${platform}/

            cp scripts/install-bitmango.sh dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/utils/setup_env.sh dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/install-bitmango.command dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/setup-env.command dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/install-bitmango.ps1 dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/setup-env.ps1 dist_binary_${platform}/ 2>/dev/null || true
            cp README-BINARY.md dist_binary_${platform}/README.md 2>/dev/null || true
            cp LICENSE dist_binary_${platform}/ 2>/dev/null || true
            cp SECURITY.md dist_binary_${platform}/ 2>/dev/null || true

            cd dist_binary_${platform} && zip -r "../dist_final/bitmango-${VERSION}-${platform}-bin.zip" . && cd ..

            rm -rf "dist_binary_${platform}"
          done

      - name: Create Release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Delete existing release and tag if they exist
          gh release delete "$VERSION" --yes --cleanup-tag || true
          git push --delete origin "$VERSION" || true
          
          # The SDK zip was downloaded into artifacts/sdk-package/
          # The binary zips were created in dist_final/
          ls -R
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            artifacts/sdk-package/bitmango-${VERSION}-sdk.zip dist_final/bitmango-${VERSION}-linux-bin.zip dist_final/bitmango-${VERSION}-macos-bin.zip dist_final/bitmango-${VERSION}-windows-bin.zip
        env:
          GH_TOKEN: ${{ github.token }}

# .github/workflows/release.yml
# GitHub Actions workflow to build and release BitMango Free Edition as standalone binaries.

name: Build and Release BitMango Free

on:
  push:
    branches:
      - 'releases-[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]'

permissions:
  contents: write

jobs:
  # Job 1: Create the GitHub Release
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      date_str: ${{ steps.get_date.outputs.date }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract date from branch name
        id: get_date
        run: |
          # Branch format is releases-YYYY-MM-DD
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          DATE_STR="${BRANCH_NAME#releases-}"
          echo "date=$DATE_STR" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_date.outputs.date }}
          tag_name: ${{ steps.get_date.outputs.date }}
          draft: false
          prerelease: false
          generate_release_notes: true

  # Job 2: Multi-platform Matrix Build
  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin nuitka
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build Rust modules
        run: maturin develop --release
        shell: bash

      - name: Run Nuitka Build
        run: |
          # Note: If build.py does not exist, we use a standard Nuitka command 
          # to compile the entry points into standalone binaries.
          if [ -f "build.py" ]; then
            python build.py
          else
            # Compile core binaries using Nuitka standalone mode
            # bitmango
            python -m nuitka --standalone --onefile \
              --output-filename=bitmango${{ matrix.suffix }} \
              bitmango-free/bin/bitmango
            
            # bitmango-vault
            python -m nuitka --standalone --onefile \
              --output-filename=bitmango-vault${{ matrix.suffix }} \
              bitmango-free/bin/bitmango-vault
            
            # bitmango-help
            python -m nuitka --standalone --onefile \
              --output-filename=bitmango-help${{ matrix.suffix }} \
              bitmango-free/bin/bitmango-help
          fi
        shell: bash

      - name: Package Binaries
        id: package
        run: |
          DATE_STR="${{ needs.create-release.outputs.date_str }}"
          ZIP_NAME="bitmango-${DATE_STR}-${{ matrix.platform }}.zip"
          
          # Collect all binaries into a zip
          mkdir -p dist_release
          mv bitmango${{ matrix.suffix }} dist_release/
          mv bitmango-vault${{ matrix.suffix }} dist_release/
          mv bitmango-help${{ matrix.suffix }} dist_release/
          
          # Add LICENSE and README if they exist
          cp LICENSE dist_release/ 2>/dev/null || true
          cp bitmango-free/LICENSE dist_release/ 2>/dev/null || true
          cp README.md dist_release/ 2>/dev/null || true
          
          cd dist_release
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a ../$ZIP_NAME *
          else
            zip -r ../$ZIP_NAME *
          fi
          echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.date_str }}
          files: ${{ steps.package.outputs.zip_path }}

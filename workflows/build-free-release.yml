name: Build Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
jobs:
  build:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux, suffix: ""}
          - {os: windows-latest, platform: windows, suffix: ".exe"}
          - {os: macos-latest, platform: macos, suffix: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Build
        shell: bash
        run: |
          # Use the environment-specific paths for activation
          if [ -d venv ]; then rm -rf venv; fi
          python -m venv venv
          if [ -f "venv/Scripts/activate" ]; then . venv/Scripts/activate; else . venv/bin/activate; fi
          ./venv/bin/uv pip install nuitka zstandard || ./venv/Scripts/uv pip install nuitka zstandard
          [ -f "requirements.txt" ] && (./venv/bin/uv pip install -r requirements.txt || ./venv/Scripts/uv pip install -r requirements.txt)
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          mkdir -p build_tmp
          for entry in bitmango bitmango-vault bitmango-help; do
            cp "bitmango-free/bin/$entry" "build_tmp/$entry.py"
            python -m nuitka --standalone --onefile --output-filename="$entry${{ matrix.suffix }}" "build_tmp/$entry.py"
            mv "$entry${{ matrix.suffix }}" "bin_outputs/${{ matrix.platform }}/" || mv "$entry.dist/$entry${{ matrix.suffix }}" "bin_outputs/${{ matrix.platform }}/" || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ github.event.inputs.version }}-${{ matrix.platform }}"
          path: "bin_outputs/${{ matrix.platform }}"
  collect-and-commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {ref: "releases-${{ github.event.inputs.version }}"}
      - uses: actions/download-artifact@v4
        with: {path: "dist_release/", pattern: "binaries-${{ github.event.inputs.version }}-*", merge-multiple: false}
      - shell: bash
        run: |
          mkdir -p dist_release/linux dist_release/macos dist_release/windows
          for dir in dist_release/binaries-${{ github.event.inputs.version }}-*; do
            platform="${dir##*-}"
            mv "$dir"/* "dist_release/$platform/"
            rmdir "$dir"
          done
          rm -rf dist_release/source && mkdir -p dist_release/source
          cp -r bitmango-cli/* dist_release/source/
          git config user.name "bot" && git config user.email "bot@bot.com"
          git add dist_release/ && git commit -m "chore: organize binaries ${{ github.event.inputs.version }}" || echo "No changes"
          git push origin HEAD:releases-${{ github.event.inputs.version }}

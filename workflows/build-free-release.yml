name: Build Bitmango Free Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g. 2026-05-18)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: bash
        run: |
          pip install nuitka zstandard
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Build Standalone Binaries (Nuitka)
        shell: bash
        run: |
          mkdir -p dist_release
          
          # Build each entry point with optimized resource usage
          for entry in bitmango bitmango-vault bitmango-help; do
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --output-filename=$entry${{ matrix.suffix }} \
              --jobs=2 \
              bitmango-free/bin/$entry
          done
          
          # Move built files explicitly
          mv bitmango${{ matrix.suffix }} dist_release/ 2>/dev/null || true
          mv bitmango-vault${{ matrix.suffix }} dist_release/ 2>/dev/null || true
          mv bitmango-help${{ matrix.suffix }} dist_release/ 2>/dev/null || true
          
          # Add release metadata
          if [ -f "LICENSE" ]; then cp LICENSE dist_release/; fi
          if [ -f "README.md" ]; then cp README.md dist_release/; fi
          
          # Include raw Python source code
          mkdir -p dist_release/source
          cp -r bitmango-free/bitmango-cli dist_release/source/
      - name: Create and Push Release Branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b releases-${{ github.event.inputs.version }}
          git push origin releases-${{ github.event.inputs.version }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitmango-binaries-${{ matrix.platform }}
          path: dist_release/

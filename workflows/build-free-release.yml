name: Build Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Release Branch
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          RELEASE_BRANCH="releases-$VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and switch to the release branch
          git checkout -B "$RELEASE_BRANCH"
          
          # Clean the branch to ensure a fresh state (excluding .git)
          git rm -rf .
          git clean -fd
          
          # Sync core files from main (already in current checkout)
          # We need to restore the files we just deleted if we want to selectively include them,
          # or just copy them from the original checkout.
          # Better approach: Checkout main again to a temp dir or use git checkout main -- path
          
          echo "📦 Syncing core files (Free Edition)..."
          INCLUDE_LIST=(
              "config/api_keys.py.example" 
              "config/config.env.example" 
              "config/exchange_health.json" 
              "demo/" 
              "docs/" 
              "tutorials/" 
              "README.md" 
              "LICENSE" 
              "NOTICE.txt" 
              "SECURITY.md" 
              "requirements.txt" 
              "pyproject.toml" 
              "uv.lock"
          )

          for item in "${INCLUDE_LIST[@]}"; do
              git checkout ${{ github.sha }} -- "$item"
          done

          # Sync bitmango-free contents to root
          echo "📦 Syncing bitmango-free contents..."
          cp -r bitmango-free/* .
          [ -f ".whitelist" ] && cp bitmango-free/.whitelist .

          # Patch pyproject.toml
          if [ -f "pyproject.toml" ]; then
            sed -i 's|bitmango-free/bitmango-cli|bitmango-cli|g' pyproject.toml
          fi

          # Copy installers and setup scripts
          cp scripts/install-bitmango.sh .
          cp scripts/install-bitmango.ps1 .
          cp scripts/install-bitmango.command install-bitmango-macos.command
          cp scripts/utils/setup_env.sh setup_env.sh
          cp scripts/setup-env.ps1 .
          cp scripts/setup-env.command setup-env-macos.command

          chmod +x install-bitmango.sh install-bitmango-macos.command setup_env.sh setup-env-macos.command

          # Finalize release branch
          git add .
          git commit -m "chore: release $VERSION (Source Only)"
          git push origin "$RELEASE_BRANCH" --force

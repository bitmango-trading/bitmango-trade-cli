name: Build Bitmango Free Release

on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build (Nuitka/Rust)
        run: |
            mkdir -p dist_release
            # Actual build commands would go here. For now, simulating artifact creation
            # by copying real file contents if available, otherwise dummy.
            if [ -f "bitmango-free/bin/bitmango" ]; then
                cp bitmango-free/bin/bitmango dist_release/bitmango${{ matrix.suffix }}
                cp bitmango-free/bin/bitmango-vault dist_release/bitmango-vault${{ matrix.suffix }}
                cp bitmango-free/bin/bitmango-help dist_release/bitmango-help${{ matrix.suffix }}
            else
                touch dist_release/bitmango${{ matrix.suffix }}
                touch dist_release/bitmango-vault${{ matrix.suffix }}
                touch dist_release/bitmango-help${{ matrix.suffix }}
            fi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitmango-binaries-${{ matrix.platform }}
          path: dist_release/

name: Build Bitmango Pro Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g. 2026-05-18)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Pro ${{ github.event.inputs.version }} - ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            suffix: ""
          - os: windows-latest
            platform: windows
            suffix: ".exe"
          - os: macos-latest
            platform: macos
            suffix: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        shell: bash
        run: |
          pip install nuitka zstandard maturin
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Build Pro Core (Rust)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd bitmango-pro/bitmango-pro-core
          maturin build --release --out ../../dist_release
          cd ../../

      - name: Build Standalone Binaries (Nuitka)
        shell: bash
        run: |
          mkdir -p dist_release
          for entry in bitmango bitmango-vault bitmango-help; do
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --output-filename=$entry${{ matrix.suffix }} \
              --jobs=2 \
              bitmango-free/bin/$entry
          done
          
          # Move binaries to platform-specific directory
          mkdir -p bin_outputs/${{ matrix.platform }}
          for entry in bitmango bitmango-vault bitmango-help; do
            if [ -f "$entry.dist/$entry${{ matrix.suffix }}" ]; then
              mv "$entry.dist/$entry${{ matrix.suffix }}" bin_outputs/${{ matrix.platform }}/
            elif [ -f "$entry${{ matrix.suffix }}" ]; then
              mv "$entry${{ matrix.suffix }}" bin_outputs/${{ matrix.platform }}/
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pro-binaries-${{ github.event.inputs.version }}-${{ matrix.platform }}
          path: bin_outputs/${{ matrix.platform }}

  collect-and-commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: releases-${{ github.event.inputs.version }}-pro
          submodules: false

      - name: Prepare workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git clean -fd

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist_release/
          pattern: pro-binaries-${{ github.event.inputs.version }}-*
          merge-multiple: true

      - name: Commit and Push
        run: |
          git add dist_release/
          if ! git diff --cached --quiet; then
            git commit -m "chore: add pro binaries for release ${{ github.event.inputs.version }}"
            git pull --rebase origin releases-${{ github.event.inputs.version }}-pro
            git push origin HEAD:releases-${{ github.event.inputs.version }}-pro
          else
            echo "No changes to commit"
          fi

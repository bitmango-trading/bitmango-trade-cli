name: Deploy Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Release Branch"
        required: true
      version:
        description: "Version Tag"
        required: true
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}
      - name: Check Access
        run: git ls-remote git@github.com:bitmango-trading/bitmango-trade-cli.git HEAD
      - name: Validate
        run: if [ ! -f "docs/changelogs/${{ github.event.inputs.version }}.md" ]; then exit 1; fi
      - name: Package
        run: ./scripts/deploy/package_release.sh ${{ github.event.inputs.version }}
      - name: Release
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file docs/changelogs/${{ github.event.inputs.version }}.md \
            *.zip
        env:
          GH_TOKEN: ${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}

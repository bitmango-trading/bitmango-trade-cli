name: Deploy Bitmango Free Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release Branch (e.g. releases-2026-05-18)'
        required: true
      version:
        description: 'Version Tag (e.g. 2026-05-18)'
        required: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Validate Release Branch
        run: |
          # 1. Check for changelog
          if [ ! -f "docs/changelogs/${{ github.event.inputs.version }}.md" ]; then
            echo "❌ Error: Changelog docs/changelogs/${{ github.event.inputs.version }}.md missing."
            exit 1
          fi
          
          # 2. Check for binaries
          if [ ! -d "dist_release" ] || [ -z "$(ls -A dist_release)" ]; then
            echo "❌ Error: No binaries found in dist_release/."
            exit 1
          fi
          
          # 3. Whitelist Check (Strictly for bitmango-free folder)
          if [ ! -f "bitmango-free/.whitelist" ]; then
            echo "❌ Error: bitmango-free/.whitelist file missing."
            exit 1
          fi
          
          # Find all files in bitmango-free and compare against its internal whitelist
          # Supports whitelist lines and exclusion lines (starting with !)
          UNAUTHORIZED_FILES=$(find bitmango-free -type f | while read file; do
            # Check if file is explicitly ignored (starts with !)
            if grep -q "^!${file}$" bitmango-free/.whitelist; then
              echo "$file"
            # Check if file is NOT in the whitelist (and not ignored)
            elif ! grep -q "^${file}$" bitmango-free/.whitelist; then
              echo "$file"
            fi
          done)
          
          if [ -n "$UNAUTHORIZED_FILES" ]; then
            echo "❌ ERROR: These files in bitmango-free are not whitelisted or are explicitly excluded:"
            echo "$UNAUTHORIZED_FILES"
            exit 1
          fi
          
          # 4. Pattern-based secret scanning
          PATTERNS="AIza[0-9A-Za-z-_]{35}|ghp_[0-9a-zA-Z]{36}|xox[baprs]-[0-9a-zA-Z]{10,}"
          if grep -rEi "$PATTERNS" . --exclude-dir=.git --exclude-dir=dist_release; then
             echo "❌ Error: Potential secrets found in release branch content."
             exit 1
          fi
          echo "✅ Release validation passed."

      - name: Create Release in Prod Repo
        run: |
          # Package artifacts into a ZIP file
          cd artifacts
          ZIP_NAME="bitmango-free-${{ github.event.inputs.version }}-${{ matrix.platform }}.zip"
          # Wait, the artifacts are already there from the build run. 
          # We need to zip the specific artifact folder.

          # Since there are multiple artifacts (one per platform), 
          # we loop through them and zip them
          for dir in *; do
            if [ -d "$dir" ]; then
              cd "$dir"
              zip -r "../${dir}.zip" .
              cd ..
            fi
          done

          # Push the zips to production repo
          gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file docs/changelogs/${{ github.event.inputs.version }}.md \
            *.zip
        env:
          GH_TOKEN: ${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}

name: Deploy Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      branch: {description: "Release Branch", required: true}
      version: {description: "Version Tag", required: true}
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.event.inputs.branch }}"}
      - uses: webfactory/ssh-agent@v0.9.0
        with: {ssh-private-key: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"}
      - name: Debug
        run: pwd && ls -R
      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DIST_DIR="./dist_release"
          for platform in "$DIST_DIR"/*; do
            if [ -d "$platform" ] && [ "${platform##*/}" != "source" ]; then
              platform_name="${platform##*/}"
              echo "Packaging $platform_name..."
              # Binaries-Only
              cp -t "$platform/" ./LICENSE ./README.md 2>/dev/null || true
              zip -r "bitmango-free-$VERSION-$platform_name-binaries.zip" "$platform_name"
              # Full-Source
              source_staging="full-source-$platform_name"
              mkdir -p "$source_staging/binaries"
              cp -r "$DIST_DIR/source/"* "$source_staging/"
              cp -r "$platform/"* "$source_staging/binaries/"
              cp ./LICENSE ./README.md "$source_staging/" 2>/dev/null || true
              cd "$source_staging"
              zip -r "../bitmango-free-$VERSION-$platform_name-full.zip" .
              cd ..
            fi
          done
          ls -l *.zip
      - name: Release
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file docs/changelogs/${{ github.event.inputs.version }}.md \
            *.zip
        env:
          GH_TOKEN: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"
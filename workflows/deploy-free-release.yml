name: Deploy Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      branch: {description: "Release Branch", required: true}
      version: {description: "Version Tag", required: true}
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.event.inputs.branch }}"}
      - uses: webfactory/ssh-agent@v0.9.0
        with: {ssh-private-key: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"}
      - name: Debug
        run: ls -R
      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd dist_release
          for platform in *; do
            if [ -d "$platform" ] && [ "$platform" != "source" ]; then
              echo "Packaging $platform..."
              cp -t "$platform/" ../LICENSE ../README.md 2>/dev/null || true
              zip -r "../bitmango-free-$VERSION-$platform-binaries.zip" "$platform"
              mkdir -p "../full-source-$platform/binaries"
              cp -r source/* "../full-source-$platform/"
              cp -r "$platform/"* "../full-source-$platform/binaries/"
              cp ../LICENSE ../README.md "../full-source-$platform/" 2>/dev/null || true
              cd "../full-source-$platform"
              zip -r "../bitmango-free-$VERSION-$platform-full.zip" .
              cd ../dist_release
            fi
          done
          ls -l ..
      - name: Release
        run: |
          find . -name "*.zip" -ls; gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file docs/changelogs/${{ github.event.inputs.version }}.md \
            ../*.zip
        env:
          GH_TOKEN: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"

name: Deploy Bitmango Free Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release Branch (e.g. releases-2026-05-18)'
        required: true
      version:
        description: 'Version Tag (e.g. 2026-05-18)'
        required: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Validate Release Branch
        run: |
          # 1. Check for changelog
          ls -R; if [ ! -f "docs/changelogs/${{ github.event.inputs.version }}.md" ]; then
            echo "❌ Error: Changelog docs/changelogs/${{ github.event.inputs.version }}.md missing."
            exit 1
          fi
          
          # 2. Check for binaries
          if [ ! -d "dist_release" ] || [ -z "$(ls -A dist_release)" ]; then
            echo "❌ Error: No binaries found in dist_release/."
            exit 1
          fi
          
          # 3. Whitelist Check (Strictly for root)
          if [ ! -f ".whitelist" ]; then
            echo "❌ Error: .whitelist file missing."
            exit 1
          fi
          
          # Find all files in root and compare against its internal whitelist
          # Supports whitelist lines and exclusion lines (starting with !)
          UNAUTHORIZED_FILES=$(find . -type f -not -path "./.git/*" -not -path "./dist_release/*" | while read file; do
            # Remove leading ./
            file=${file#./}
            # Skip the .whitelist file itself in the unauthorized list
            [[ "$file" == ".whitelist" ]] && continue
            
            # Check if file is explicitly ignored (starts with !)
            if grep -q "^!${file}$" .whitelist; then
              echo "$file"
            # Check if file is NOT in the whitelist (and not ignored)
            elif ! grep -q "^${file}$" .whitelist; then
              echo "$file"
            fi
          done)
          
          if [ -n "$UNAUTHORIZED_FILES" ]; then
            echo "❌ ERROR: These files in bitmango-free are not whitelisted or are explicitly excluded:"
            echo "$UNAUTHORIZED_FILES"
            exit 1
          fi
          
          # 4. Pattern-based secret scanning
          PATTERNS="AIza[0-9A-Za-z-_]{35}|ghp_[0-9a-zA-Z]{36}|xox[baprs]-[0-9a-zA-Z]{10,}"
          if grep -rEi "$PATTERNS" . --exclude-dir=.git --exclude-dir=dist_release; then
             echo "❌ Error: Potential secrets found in release branch content."
             exit 1
          fi
          echo "✅ Release validation passed."

      - name: Package and Release
        run: |
          cd dist_release
          # Loop through each platform directory
          for platform_dir in *; do
            if [ -d "$platform_dir" ]; then
              # 1. Binaries-Only ZIP: Files in platform_dir + Root Metadata
              echo "Packaging Binaries-Only: $platform_dir..."
              cp -t "$platform_dir/" ../LICENSE ../README.md 2>/dev/null || true
              zip -r "../bitmango-free-${{ github.event.inputs.version }}-$platform_dir-binaries.zip" "$platform_dir"

              # 2. Full-Source ZIP: Source files in root, Binaries in 'binaries/'
              echo "Packaging Full-Source: $platform_dir..."
              # Create staging for source zip to avoid mutating original
              mkdir -p "../full-source-$platform_dir"
              cp -r source/* "../full-source-$platform_dir/"
              mkdir -p "../full-source-$platform_dir/binaries"
              cp -r "$platform_dir"/* "../full-source-$platform_dir/binaries/"
              cp ../LICENSE ../README.md "../full-source-$platform_dir/" 2>/dev/null || true
              
              cd "../full-source-$platform_dir"
              zip -r "../bitmango-free-${{ github.event.inputs.version }}-$platform_dir-full.zip" .
              cd ../dist_release
            fi
          done

          # Create Release on target repo using the new ZIPs
          gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file ../docs/changelogs/${{ github.event.inputs.version }}.md \
            *.zip
        env:
          GH_TOKEN: ${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}

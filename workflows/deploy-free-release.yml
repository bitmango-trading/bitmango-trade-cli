name: Deploy Bitmango Free Release
on:
  workflow_dispatch:
    inputs:
      branch: {description: "Release Branch", required: true}
      version: {description: "Version Tag", required: true}
jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.event.inputs.branch }}"}
      - uses: webfactory/ssh-agent@v0.9.0
        with: {ssh-private-key: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"}
      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Create a flat zip for the distribution
          zip -r "bitmango-free-$VERSION-binaries.zip" dist_release/
          # Create full source zip
          mkdir -p full-source
          cp -r dist_release/source/* full-source/
          mkdir -p full-source/binaries
          cp dist_release/* full-source/binaries/ 2>/dev/null || true
          zip -r "bitmango-free-$VERSION-full.zip" full-source/
      - name: Release
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --repo bitmango-trading/bitmango-trade-cli \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes-file docs/changelogs/${{ github.event.inputs.version }}.md \
            *.zip
        env:
          GH_TOKEN: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"

name: Sync Release to Public Repo
on:
  workflow_dispatch:
    inputs:
      branch: {description: "Release Branch", required: true}
      version: {description: "Version Tag", required: true}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "${{ github.event.inputs.branch }}"
          fetch-depth: 0

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"

      - name: Push to Public Repo
        run: |
          git remote add public git@github.com:bitmango-trading/bitmango-trade-cli.git
          # Push the release branch to the public repo using its original name
          git push public "${{ github.event.inputs.branch }}:${{ github.event.inputs.branch }}" --force

      - name: Trigger Public Build
        run: |
          # Use gh to trigger the workflow on the public repo's main branch
          gh workflow run "Build and Publish Release" \
            --repo bitmango-trading/bitmango-trade-cli \
            --ref main \
            -f version="${{ github.event.inputs.version }}" \
            -f source_ref="${{ github.event.inputs.branch }}"
        env:
          GH_TOKEN: "${{ secrets.BITMANGO_TRADE_CLI_FREE_PAT }}"

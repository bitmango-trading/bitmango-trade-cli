name: Build and Publish Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
      source_ref: {description: "Source Ref (Branch/Tag) to build from", required: true}

jobs:
  build:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux, suffix: ""}
          - {os: windows-latest, platform: windows, suffix: ".exe"}
          - {os: macos-latest, platform: macos, suffix: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - name: Build Standalone Binaries
        shell: bash
        run: |
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          mkdir -p build_staging

          python -m venv venv
          if [ -f "venv/Scripts/activate" ]; then . venv/Scripts/activate; else . venv/bin/activate; fi
          pip install nuitka zstandard
          [ -f "requirements.txt" ] && pip install -r requirements.txt

          # Nuitka requires a valid Python package name as the import root.
          # The source directory is "bitmango-cli/" (hyphenated, invalid package name).
          # Copy it as "bitmango/" so Nuitka's internal staging resolves correctly.
          cp -r "bitmango-cli" "build_staging/bitmango"
          cp -r "bin" "build_staging/"
          cp -r "config" "build_staging/"
          cp -r "demo" "build_staging/" 2>/dev/null || true

          cd build_staging
          for entry in bitmango bitmango-vault bitmango-help; do
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --follow-imports \
              --output-dir=. \
              --output-filename="../bin_outputs/${{ matrix.platform }}/${{ matrix.platform }}-$entry${{ matrix.suffix }}" "bin/$entry"
          done
          cd ..

          rm -rf build_staging
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ matrix.platform }}"
          path: "bin_outputs/${{ matrix.platform }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/download-artifact@v4
        with: {path: "artifacts"}

      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dist_release/linux dist_release/macos dist_release/windows

          # --- Validate build artifacts exist before packaging ---
          echo "::group::Artifacts downloaded"
          ls -la artifacts/
          echo "::endgroup::"

          for dir in linux macos windows; do
            suffix=""
            [ "$dir" = "windows" ] && suffix=".exe"
            for bin in bitmango bitmango-vault bitmango-help; do
              if [ ! -f "artifacts/binaries-$dir/$dir-$bin$suffix" ]; then
                echo "ERROR: Missing binary $bin$suffix for $dir"
                ls -la "artifacts/binaries-$dir/"
                exit 1
              fi
            done
          done

          # Linux
          cp artifacts/binaries-linux/* dist_release/linux/
          # macOS
          cp artifacts/binaries-macos/* dist_release/macos/
          # Windows
          cp artifacts/binaries-windows/* dist_release/windows/

          # --- Binary-only zips (binaries per platform) ---
          cd dist_release/linux && zip -r "../../bitmango-$VERSION-linux-bin.zip" . && cd ../..
          cd dist_release/macos && zip -r "../../bitmango-$VERSION-macos-bin.zip" . && cd ../..
          cd dist_release/windows && zip -r "../../bitmango-$VERSION-windows-bin.zip" . && cd ../..

          # --- SDK zip (Python source) ---
          zip -r "bitmango-$VERSION-sdk.zip" . -x "artifacts/*" "venv/*" ".git/*" "dist_release/*" "*.zip"

          echo "::group::Produced packages"
          ls -la *.zip
          echo "::endgroup::"

      - name: Create Release
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Reject obviously invalid tags before creating the release
          if ! echo "$VERSION" | grep -qE '^[0-9]{4}[.\-][0-9]{2}[.\-][0-9]{2}$'; then
            echo "ERROR: Invalid version format '$VERSION'. Expected date format like 2026-06-01"
            exit 1
          fi

          gh release create "v$VERSION" \
            --title "Release $VERSION" \
            "bitmango-$VERSION-linux-bin.zip" \
            "bitmango-$VERSION-macos-bin.zip" \
            "bitmango-$VERSION-windows-bin.zip" \
            "bitmango-$VERSION-sdk.zip"
        env:
          GH_TOKEN: ${{ github.token }}

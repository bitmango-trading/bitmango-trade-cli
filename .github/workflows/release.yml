name: Build and Publish Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
      source_ref: {description: "Source Ref (Branch/Tag) to build from", required: true}

jobs:
  build:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux, suffix: ""}
          - {os: windows-latest, platform: windows, suffix: ".exe"}
          - {os: macos-latest, platform: macos, suffix: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - name: Build Standalone Binaries
        shell: bash
        run: |
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          mkdir -p build_staging

          python -m venv venv
          if [ -f "venv/Scripts/activate" ]; then . venv/Scripts/activate; else . venv/bin/activate; fi
          pip install nuitka zstandard
          [ -f "requirements.txt" ] && pip install -r requirements.txt

          cp -r bitmango-cli build_staging/bitmango 2>/dev/null || cp -r bitmango-free/bitmango-cli build_staging/bitmango
          cp -r bin build_staging/ 2>/dev/null || cp -r bitmango-free/bin build_staging/
          cp -r demo build_staging/ 2>/dev/null || true
          cp -r config build_staging/ 2>/dev/null || true

          cd build_staging
          for entry in bitmango bitmango-vault bitmango-help; do
            python -m nuitka --standalone --onefile --assume-yes-for-downloads \
              --follow-imports \
              --output-dir=. \
              --output-filename="../bin_outputs/${{ matrix.platform }}/${{ matrix.platform }}-$entry${{ matrix.suffix }}" "bin/$entry"
          done
          cd ..

          rm -rf build_staging
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ matrix.platform }}"
          path: "bin_outputs/${{ matrix.platform }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/download-artifact@v4
        with: {path: "artifacts"}

      - name: Create Binary Packages
        run: |
          VERSION="${{ github.event.inputs.version }}"

          for platform in linux macos windows; do
            mkdir -p "dist_binary_${platform}"

            for f in artifacts/binaries-$platform/*; do
              if [ -f "$f" ]; then
                filename=$(basename "$f")
                simple_name=$(echo "$filename" | cut -d'-' -f2-)
                cp "$f" "dist_binary_${platform}/${simple_name}"
              fi
            done

            cp scripts/install-bitmango.sh dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/utils/setup_env.sh dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/install-bitmango.command dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/setup-env.command dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/install-bitmango.ps1 dist_binary_${platform}/ 2>/dev/null || true
            cp scripts/setup-env.ps1 dist_binary_${platform}/ 2>/dev/null || true
            cp README.md dist_binary_${platform}/ 2>/dev/null || true
            cp LICENSE dist_binary_${platform}/ 2>/dev/null || true
            cp SECURITY.md dist_binary_${platform}/ 2>/dev/null || true

            cd dist_binary_${platform} && zip -r "../../bitmango-${VERSION}-${platform}-bin.zip" . && cd ..

            rm -rf "dist_binary_${platform}"
          done

      - name: Create SDK Package
        run: |
          VERSION="${{ github.event.inputs.version }}"

          mkdir -p dist_sdk

          cp -r bitmango-free/bitmango-cli dist_sdk/
          cp -r demo dist_sdk/ 2>/dev/null || true
          cp -r config dist_sdk/ 2>/dev/null || true
          cp -r tutorials dist_sdk/ 2>/dev/null || true
          cp LICENSE dist_sdk/ 2>/dev/null || true
          cp README.md dist_sdk/ 2>/dev/null || true
          cp SECURITY.md dist_sdk/ 2>/dev/null || true
          cp -r bitmango-free/bin dist_sdk/ 2>/dev/null || true

          cd dist_sdk && zip -r "../../bitmango-${VERSION}-sdk.zip" . && cd ..
          rm -rf dist_sdk

      - name: Create Release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            *.zip
        env:
          GH_TOKEN: ${{ github.token }}
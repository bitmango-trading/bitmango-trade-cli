name: Build and Publish Release
on:
  workflow_dispatch:
    inputs:
      version: {description: "Version Tag", required: true}
      source_ref: {description: "Source Ref (Branch/Tag)", required: true}
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - {os: ubuntu-latest, platform: linux, suffix: ""}
          - {os: windows-latest, platform: windows, suffix: ".exe"}
          - {os: macos-latest, platform: macos, suffix: ""}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.ref }}
      - name: Build
        shell: bash
        run: |
          python -m venv venv
          if [ -f "venv/Scripts/activate" ]; then . venv/Scripts/activate; else . venv/bin/activate; fi
          pip install nuitka zstandard
          [ -f "requirements.txt" ] && pip install -r requirements.txt
          mkdir -p "bin_outputs/${{ matrix.platform }}"
          # The source code in the public repo might have a different structure, 
          # but assuming it's the contents of 'bitmango-free' or the full repo.
          # Based on current setup, the binaries are in bitmango-free/bin/
          for entry in bitmango bitmango-vault bitmango-help; do
            # Note: Adjusting path to relative root if bitmango-free is the root in public repo
            TARGET_PATH="bitmango-free/bin/$entry"
            if [ ! -f "$TARGET_PATH" ]; then TARGET_PATH="bin/$entry"; fi
            
            python -m nuitka --standalone --onefile --output-filename="$entry${{ matrix.suffix }}" "$TARGET_PATH"
            mv "$entry${{ matrix.suffix }}" "bin_outputs/${{ matrix.platform }}/" || mv "$entry.dist/$entry${{ matrix.suffix }}" "bin_outputs/${{ matrix.platform }}/" || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: "binaries-${{ matrix.platform }}"
          path: "bin_outputs/${{ matrix.platform }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {path: "artifacts"}
      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mkdir -p dist_release/linux dist_release/macos dist_release/windows
          
          cp -r artifacts/binaries-linux/* dist_release/linux/ 2>/dev/null || true
          cp -r artifacts/binaries-macos/* dist_release/macos/ 2>/dev/null || true
          cp -r artifacts/binaries-windows/* dist_release/windows/ 2>/dev/null || true
          
          # Create zip
          zip -r "bitmango-free-$VERSION-binaries.zip" dist_release/
          
          # Create full source zip (assuming current dir is source)
          zip -r "bitmango-free-$VERSION-full.zip" . -x "artifacts/*" "venv/*" ".git/*"
          
      - name: Create Release
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --generate-notes \
            *.zip
        env:
          GH_TOKEN: ${{ github.token }}
